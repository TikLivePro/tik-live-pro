# ==============================================================================
# docker-compose.prod.managed.yml — Production stack with managed external DBs
#
# Postgres → Neon (free tier)    https://neon.tech
# Redis    → Upstash (free tier) https://upstash.com
#
# This file is used by the GitHub Actions deploy workflow on the 4 GB Droplet.
# The server only runs application containers — no heavy infra to self-host.
#
# Required env vars in /opt/tiklivepro/.env on the server:
#
#   REGISTRY=ghcr.io/YOUR_GITHUB_USERNAME/tik-live-pro
#   IMAGE_TAG=latest          # overridden by CI to the commit SHA
#
#   JWT_SECRET=<openssl rand -hex 64>
#   TOKEN_ENCRYPTION_KEY=<openssl rand -hex 32>
#   INTERNAL_API_KEY=<openssl rand -hex 32>
#   POSTGRES_PASSWORD=unused  # kept for compat, not used by managed version
#
#   # Neon connection strings (one per service — same host, different DB name)
#   AUTH_DATABASE_URL=postgresql://user:pass@ep-xxx.region.aws.neon.tech/tiklivepro_auth?sslmode=require
#   USERS_DATABASE_URL=postgresql://user:pass@ep-xxx.region.aws.neon.tech/tiklivepro_users?sslmode=require
#   SESSIONS_DATABASE_URL=postgresql://user:pass@ep-xxx.region.aws.neon.tech/tiklivepro_sessions?sslmode=require
#   BILLING_DATABASE_URL=postgresql://user:pass@ep-xxx.region.aws.neon.tech/tiklivepro_billing?sslmode=require
#   INTEGRATIONS_DATABASE_URL=postgresql://user:pass@ep-xxx.region.aws.neon.tech/tiklivepro_integrations?sslmode=require
#   COMMENTS_DATABASE_URL=postgresql://user:pass@ep-xxx.region.aws.neon.tech/tiklivepro_comments?sslmode=require
#   NOTIFICATIONS_DATABASE_URL=postgresql://user:pass@ep-xxx.region.aws.neon.tech/tiklivepro_notifications?sslmode=require
#   ANALYTICS_DATABASE_URL=postgresql://user:pass@ep-xxx.region.aws.neon.tech/tiklivepro_analytics?sslmode=require
#   STREAM_DATABASE_URL=postgresql://user:pass@ep-xxx.region.aws.neon.tech/tiklivepro_stream?sslmode=require
#
#   # Upstash Redis (TLS URL from the Upstash console)
#   REDIS_URL=rediss://default:TOKEN@HOST.upstash.io:6379
#
#   # Social OAuth
#   TIKTOK_CLIENT_KEY=...
#   TIKTOK_CLIENT_SECRET=...
#   FACEBOOK_APP_ID=...
#   FACEBOOK_APP_SECRET=...
#
#   # Stripe
#   STRIPE_SECRET_KEY=...
#   STRIPE_WEBHOOK_SECRET=...
#   STRIPE_PREMIUM_PRICE_ID=...
#
#   # Grafana (only used with --profile observability)
#   GRAFANA_PASSWORD=...
#
#   # Web frontend — server-side runtime vars
#   NEXTAUTH_URL=https://tiklivepro.me
#   NEXTAUTH_SECRET=<openssl rand -base64 32>
#   GOOGLE_CLIENT_ID=...
#   GOOGLE_CLIENT_SECRET=...
#
#   # NEXT_PUBLIC_* must be baked into the image at build time (--build-arg).
#   # Setting them here only affects SSR paths, not client-side JS.
#   NEXT_PUBLIC_API_URL=https://api.tiklivepro.me
#   NEXT_PUBLIC_COMMENTS_WS_URL=https://api.tiklivepro.me
#   NEXT_PUBLIC_GIPHY_API_KEY=    # optional
#
#   # SMTP — welcome email on registration (optional; omit SMTP_USER to disable)
#   SMTP_PROVIDER=gmail          # gmail | sendgrid | custom
#   SMTP_USER=you@gmail.com
#   SMTP_PASS=your-app-password
#   SMTP_FROM=TikLive Pro <noreply@tiklivepro.me>
#   # Only for SMTP_PROVIDER=custom:
#   # SMTP_HOST=smtp.example.com
#   # SMTP_PORT=587
#   # SMTP_SECURE=false
#
#   # MediaMTX — platform-native HLS/WebRTC streaming relay (Go binary, ~10–30 MB RAM)
#   # MEDIAMTX_RTMP_URL is container-internal; default is fine and needs no secret.
#   # MEDIAMTX_HLS_URL is the public URL browsers use to watch HLS streams.
#   # Point it at the Caddy-fronted subdomain so viewers get HTTPS.
#   MEDIAMTX_HLS_URL=https://hls.tiklivepro.me
#   # MEDIAMTX_WEBRTC_URL is the public WHIP URL — returned to the broadcaster's browser
#   # by the ingest API (GET /sessions/:id/ingest → whipUrl). Must be HTTPS.
#   MEDIAMTX_WEBRTC_URL=https://webrtc.tiklivepro.me
#   # No credentials needed for MediaMTX — both dev and prod use open auth (user: any).
#   # MediaMTX does not interpolate $VAR in user/pass config fields; session security is
#   # enforced at the app layer via UUID ingestKeys. Ports 9997 and 1936 are internal-only.
#
# RAM budget on 4 GB Droplet (no observability):
#   NATS 128m + MediaMTX 64m + 10 services ~1780m + web 512m + status 96m ≈ 2580m  ← comfortable
# ==============================================================================

x-service-defaults: &service-defaults
  restart: unless-stopped
  networks:
    - tik-live-pro
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

x-backend-env: &backend-env
  NODE_ENV: production
  LOG_LEVEL: info
  NATS_URL: nats://nats:4222
  CORRELATION_ID_HEADER: x-correlation-id
  TRACE_ID_HEADER: x-trace-id

services:

  # ── Infrastructure (NATS only — Postgres and Redis are managed externally) ───

  nats:
    <<: *service-defaults
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--name", "tik-live-pro-prod"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    deploy:
      resources:
        limits:
          memory: 128m
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability (opt-in — start with --profile observability) ──────────────

  jaeger:
    <<: *service-defaults
    profiles: ["observability"]
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=memory
      - MEMORY_MAX_TRACES=10000
    ports:
      - "16686:16686"
      - "14268:14268"
    deploy:
      resources:
        limits:
          memory: 768m

  otel-collector:
    <<: *service-defaults
    profiles: ["observability"]
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"
      - "4318:4318"
    depends_on:
      - jaeger
    deploy:
      resources:
        limits:
          memory: 256m

  prometheus:
    <<: *service-defaults
    profiles: ["observability"]
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--storage.tsdb.retention.size=1GB"
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 512m

  grafana:
    <<: *service-defaults
    profiles: ["observability"]
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-}
      - GF_SERVER_HTTP_PORT=3001
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3001"
    depends_on:
      - prometheus
    deploy:
      resources:
        limits:
          memory: 256m

  # ── MediaMTX — platform-native streaming relay ───────────────────────────────
  # Go binary (~10–30 MB RAM). Receives RTMP relay from ffmpeg workers on port 1936;
  # serves HLS to browser viewers on port 8888 (proxied by Caddy → hls.tiklivepro.me).
  # Port 1936 is exposed only inside the Docker network — no public access needed.

  # Ensures /recordings inside the named volume is owned by UID 1001 (nodeuser)
  # so that mediamtx (running as 1001) can write to it and stream-orchestrator
  # (also nodeuser:1001) can delete files after upload.
  mediamtx-init:
    image: alpine:3.19
    command: ["sh", "-c", "chown -R 1001:1001 /recordings && chmod 755 /recordings"]
    volumes:
      - mediamtx_recordings:/recordings
    networks:
      - tik-live-pro

  mediamtx:
    <<: *service-defaults
    image: bluenviron/mediamtx:latest
    user: "1001:1001"
    depends_on:
      mediamtx-init:
        condition: service_completed_successfully
    volumes:
      - ./infra/mediamtx/mediamtx.prod.yml:/mediamtx.yml:ro
      - mediamtx_recordings:/recordings          # shared with stream-orchestrator for upload
    environment:
      # Tell MediaMTX to advertise the server's public IP in ICE candidates so
      # browsers can reach the UDP port from the internet. Without this, MediaMTX
      # only advertises its Docker-internal IP (172.x.x.x), which is unreachable.
      MTX_WEBRTCADDITIONALHOSTS: ${SERVER_PUBLIC_IP:?SERVER_PUBLIC_IP is required}
    ports:
      - "8888:8888"     # HLS — Caddy reverse-proxies this as https://hls.tiklivepro.me
      - "8889:8889"     # WebRTC HTTP signalling
      - "8189:8189/udp" # WebRTC ICE UDP — required for browser WHIP media transport
    deploy:
      resources:
        limits:
          memory: 64m
    healthcheck:
      disable: true

  # ── Microservices ─────────────────────────────────────────────────────────────

  api-gateway:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/api-gateway:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3000"
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      REDIS_URL: ${REDIS_URL:-}
      AUTH_SERVICE_URL: http://auth:3001
      USER_SERVICE_URL: http://users:3002
      SESSION_SERVICE_URL: http://live-session:3003
      BILLING_SERVICE_URL: http://billing:3004
      INTEGRATION_SERVICE_URL: http://integrations:3005
      COMMENTS_SERVICE_URL: http://comments:3006
      NOTIFICATIONS_SERVICE_URL: http://notifications:3007
      ANALYTICS_SERVICE_URL: http://analytics:3008
      STREAM_ORCHESTRATOR_SERVICE_URL: http://stream-orchestrator:3009
      NODE_OPTIONS: "--max-old-space-size=128"
    ports:
      - "3000:3000"
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 192m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  auth:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/auth-service:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3001"
      DATABASE_URL: ${AUTH_DATABASE_URL:?AUTH_DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRES_IN: "15m"
      JWT_REFRESH_EXPIRES_IN: "30d"
      # SMTP — optional. Leave SMTP_USER blank to disable welcome emails.
      SMTP_PROVIDER: ${SMTP_PROVIDER:-gmail}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_SECURE: ${SMTP_SECURE:-}
      NODE_OPTIONS: "--max-old-space-size=96"
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 160m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  users:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/users-service:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3002"
      DATABASE_URL: ${USERS_DATABASE_URL:?USERS_DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      CDN_BASE_URL: ${CDN_BASE_URL:-https://cdn.tiklivepro.pro}
      NODE_OPTIONS: "--max-old-space-size=96"
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 160m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  live-session:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/live-session-service:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3003"
      DATABASE_URL: ${SESSIONS_DATABASE_URL:?SESSIONS_DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_OPTIONS: "--max-old-space-size=96"
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 160m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  billing:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/billing-service:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3004"
      DATABASE_URL: ${BILLING_DATABASE_URL:?BILLING_DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?STRIPE_SECRET_KEY is required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?STRIPE_WEBHOOK_SECRET is required}
      STRIPE_PREMIUM_PRICE_ID: ${STRIPE_PREMIUM_PRICE_ID:?STRIPE_PREMIUM_PRICE_ID is required}
      NODE_OPTIONS: "--max-old-space-size=96"
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 160m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3004/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  integrations:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/integrations-service:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3005"
      DATABASE_URL: ${INTEGRATIONS_DATABASE_URL:?INTEGRATIONS_DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY:?TIKTOK_CLIENT_KEY is required}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:?TIKTOK_CLIENT_SECRET is required}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:?FACEBOOK_APP_ID is required}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:?FACEBOOK_APP_SECRET is required}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY:?TOKEN_ENCRYPTION_KEY is required}
      OAUTH_REDIRECT_BASE_URL: ${OAUTH_REDIRECT_BASE_URL:-https://api.tiklivepro.me}
      NODE_OPTIONS: "--max-old-space-size=128"
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 192m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3005/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  comments:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/comments-service:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3006"
      DATABASE_URL: ${COMMENTS_DATABASE_URL:?COMMENTS_DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:?INTERNAL_API_KEY is required}
      COMMENT_POLL_INTERVAL_MS: "2000"
      NODE_OPTIONS: "--max-old-space-size=128"
    ports:
      - "3006:3006"   # Socket.IO WebSocket — Caddy reverse-proxies this as wss://api.tiklivepro.me/socket.io
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 192m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3006/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  notifications:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/notifications-service:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3007"
      DATABASE_URL: ${NOTIFICATIONS_DATABASE_URL:?NOTIFICATIONS_DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_OPTIONS: "--max-old-space-size=64"
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3007/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  analytics:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/analytics-service:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3008"
      DATABASE_URL: ${ANALYTICS_DATABASE_URL:?ANALYTICS_DATABASE_URL is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      NODE_OPTIONS: "--max-old-space-size=64"
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3008/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  stream-orchestrator:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/stream-orchestrator:${IMAGE_TAG:-latest}
    environment:
      <<: *backend-env
      PORT: "3009"
      DATABASE_URL: ${STREAM_DATABASE_URL:?STREAM_DATABASE_URL is required}
      RTMP_INGEST_PORT: "1935"
      RTMP_INGEST_HOST: "0.0.0.0"
      INTEGRATIONS_SERVICE_URL: http://integrations:3005
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY:?TIKTOK_CLIENT_KEY is required}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:?TIKTOK_CLIENT_SECRET is required}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:?FACEBOOK_APP_ID is required}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:?FACEBOOK_APP_SECRET is required}
      MEDIAMTX_RTMP_URL: rtmp://mediamtx:1936
      MEDIAMTX_HLS_URL: ${MEDIAMTX_HLS_URL:-https://hls.tiklivepro.me}
      MEDIAMTX_WEBRTC_URL: ${MEDIAMTX_WEBRTC_URL:-https://webrtc.tiklivepro.me}
      MEDIAMTX_API_URL: http://mediamtx:9997
      MEDIAMTX_API_USER: ${MEDIAMTX_API_USER:-}
      MEDIAMTX_API_PASS: ${MEDIAMTX_API_PASS:-}
      # Recording upload — optional. Omit RECORDING_STORAGE_PROVIDER to disable.
      # See docs/recording.md for setup instructions (DO Spaces or Cloudflare R2).
      # yt-dlp auto-update: fetches latest extractor on every container start.
      # Keeps URL resolution working even between image rebuilds.
      YTDLP_AUTO_UPDATE: "true"
      # PO token sidecar — bypasses YouTube datacenter bot detection without session cookies.
      BGUTIL_POT_SERVER_URL: http://bgutil-pot-provider:4416
      RECORDINGS_DIR: /recordings
      RECORDING_STORAGE_PROVIDER: ${RECORDING_STORAGE_PROVIDER:-}
      RECORDING_STORAGE_BUCKET: ${RECORDING_STORAGE_BUCKET:-}
      RECORDING_STORAGE_REGION: ${RECORDING_STORAGE_REGION:-auto}
      RECORDING_STORAGE_ENDPOINT: ${RECORDING_STORAGE_ENDPOINT:-}
      RECORDING_STORAGE_ACCESS_KEY_ID: ${RECORDING_STORAGE_ACCESS_KEY_ID:-}
      RECORDING_STORAGE_SECRET_ACCESS_KEY: ${RECORDING_STORAGE_SECRET_ACCESS_KEY:-}
      RECORDING_STORAGE_CDN_URL: ${RECORDING_STORAGE_CDN_URL:-}
      NODE_OPTIONS: "--max-old-space-size=192"
    volumes:
      - mediamtx_recordings:/recordings            # uploader reads .fmp4 files and deletes after upload
    ports:
      - "3009:3009"
      - "1935:1935"
    depends_on:
      nats:
        condition: service_healthy
      mediamtx:
        condition: service_started
      bgutil-pot-provider:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 320m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3009/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── bgutil PO token provider ─────────────────────────────────────────────────
  # Generates YouTube Proof-of-Origin tokens so yt-dlp can resolve URLs from
  # datacenter IPs without session cookies (which YouTube rotates on IP change).
  bgutil-pot-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    restart: unless-stopped
    networks:
      - tik-live-pro
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4416/ping',r=>{process.exit(r.statusCode<500?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  # ── Status page — https://status.tiklivepro.me ───────────────────────────────
  # Lightweight Next.js app. Pings every service /health endpoint from the server
  # side and serves the aggregated status at port 3011 (Caddy → status.tiklivepro.me).
  # Uses internal Docker service hostnames — no public network access needed.

  status:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/status:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: "3011"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max-old-space-size=64"
      # Internal URLs for health checks — resolved via Docker bridge network
      API_GATEWAY_URL: http://api-gateway:3000
      AUTH_SERVICE_URL: http://auth:3001
      USERS_SERVICE_URL: http://users:3002
      LIVE_SESSION_SERVICE_URL: http://live-session:3003
      BILLING_SERVICE_URL: http://billing:3004
      INTEGRATIONS_SERVICE_URL: http://integrations:3005
      COMMENTS_SERVICE_URL: http://comments:3006
      NOTIFICATIONS_SERVICE_URL: http://notifications:3007
      ANALYTICS_SERVICE_URL: http://analytics:3008
      STREAM_ORCHESTRATOR_URL: http://stream-orchestrator:3009
      MEDIAMTX_API_URL: http://mediamtx:9997
      NATS_MONITORING_URL: http://nats:8222
    ports:
      - "3011:3011"
    depends_on:
      nats:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 96m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3011/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Web frontend ─────────────────────────────────────────────────────────────

  web:
    <<: *service-defaults
    image: ${REGISTRY:-ghcr.io/tik-live-pro}/web:${IMAGE_TAG:-latest}
    environment:
      NODE_ENV: production
      PORT: "3010"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_OPTIONS: "--max-old-space-size=384"
      # ── Server-side runtime vars ────────────────────────────────────────────
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://tiklivepro.me}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      AUTH_SERVICE_INTERNAL_URL: http://auth:3001
      # Used server-side by /api/video-proxy/merge-stream to reach the backend
      # without depending on NEXT_PUBLIC_API_URL (which is baked at build time).
      STREAM_ORCHESTRATOR_INTERNAL_URL: http://stream-orchestrator:3009
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      FACEBOOK_APP_ID: ${FACEBOOK_APP_ID:-}
      FACEBOOK_APP_SECRET: ${FACEBOOK_APP_SECRET:-}
      TIKTOK_CLIENT_KEY: ${TIKTOK_CLIENT_KEY:-}
      TIKTOK_CLIENT_SECRET: ${TIKTOK_CLIENT_SECRET:-}
      # ── Build-time public vars (reference only) ─────────────────────────────
      # NEXT_PUBLIC_* are baked into the JS bundle when the image is built.
      # Setting them here has NO effect on client-side code — they only affect
      # SSR paths. Pass real values via --build-arg to `build.sh` or the CI
      # workflow before building the image.
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.tiklivepro.me}
      NEXT_PUBLIC_COMMENTS_WS_URL: ${NEXT_PUBLIC_COMMENTS_WS_URL:-https://api.tiklivepro.me}
      NEXT_PUBLIC_GIPHY_API_KEY: ${NEXT_PUBLIC_GIPHY_API_KEY:-}
    ports:
      - "3010:3010"
    depends_on:
      api-gateway:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3010/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

# ── Networks & Volumes ─────────────────────────────────────────────────────────

networks:
  tik-live-pro:
    driver: bridge

volumes:
  nats_data:
  prometheus_data:
  grafana_data:
  mediamtx_recordings:    # recording buffer: mediamtx writes, stream-orchestrator uploads + deletes
