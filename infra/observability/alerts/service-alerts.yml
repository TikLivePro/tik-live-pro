# ==============================================================================
# Prometheus Alerting Rules — tik-live-pro services
#
# Location: infra/observability/alerts/service-alerts.yml
# Loaded by: prometheus.yml  (rule_files: /etc/prometheus/alerts/*.yml)
#
# Severity levels:
#   critical — page immediately; service is down or data is being lost
#   warning  — investigate soon; degraded performance or approaching limits
#   info     — awareness only; no action required
#
# Runbooks referenced below should be added to docs/runbooks/.
# ==============================================================================

groups:

  # ── Service Health ───────────────────────────────────────────────────────────
  - name: service_health
    interval: 30s
    rules:

      - alert: ServiceDown
        expr: up{job=~".+-service|api-gateway|stream-orchestrator"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is DOWN"
          description: >
            Prometheus cannot scrape {{ $labels.job }} at {{ $labels.instance }}.
            The service has been unreachable for more than 1 minute.
          runbook: https://docs.tiklivepro.pro/runbooks/service-down

      - alert: HighErrorRate
        # More than 5% of HTTP responses are 5xx over the last 5 minutes
        expr: |
          (
            sum by (job) (rate(http_requests_total{status=~"5.."}[5m]))
            /
            sum by (job) (rate(http_requests_total[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate on {{ $labels.job }}"
          description: >
            {{ $labels.job }} is returning {{ $value | humanizePercentage }} 5xx errors
            over the last 5 minutes.
          runbook: https://docs.tiklivepro.pro/runbooks/high-error-rate

      - alert: HighLatencyP99
        # 99th-percentile latency above 2 s for more than 3 minutes
        expr: |
          histogram_quantile(0.99,
            sum by (job, le) (rate(http_request_duration_seconds_bucket[5m]))
          ) > 2
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High P99 latency on {{ $labels.job }}"
          description: >
            99th-percentile latency for {{ $labels.job }} is {{ $value | humanizeDuration }},
            exceeding the 2 s threshold.
          runbook: https://docs.tiklivepro.pro/runbooks/high-latency

  # ── NATS JetStream ───────────────────────────────────────────────────────────
  - name: nats_health
    interval: 30s
    rules:

      - alert: NATSDown
        expr: up{job="nats"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "NATS server is unreachable"
          description: >
            Prometheus cannot reach the NATS monitoring endpoint.
            All event-driven services will be unable to publish or consume messages.
          runbook: https://docs.tiklivepro.pro/runbooks/nats-down

      - alert: NATSHighPendingMessages
        # More than 100 000 messages pending across all streams
        expr: nats_jetstream_stream_total_messages > 100000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "NATS stream {{ $labels.stream_name }} has high pending messages"
          description: >
            Stream {{ $labels.stream_name }} has {{ $value }} messages.
            Consumers may be falling behind. Check consumer lag.

  # ── Resource Utilisation ─────────────────────────────────────────────────────
  - name: resource_usage
    interval: 60s
    rules:

      - alert: HighMemoryUsage
        # Container using >85% of its memory limit
        expr: |
          (container_memory_working_set_bytes
            / container_spec_memory_limit_bytes) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage in {{ $labels.container }}"
          description: >
            Container {{ $labels.container }} in pod {{ $labels.pod }}
            is using {{ $value | humanizePercentage }} of its memory limit.

      - alert: HighCPUUsage
        # Container using >90% of its CPU limit averaged over 5 minutes
        expr: |
          (rate(container_cpu_usage_seconds_total[5m])
            / container_spec_cpu_quota * container_spec_cpu_period) > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage in {{ $labels.container }}"
          description: >
            Container {{ $labels.container }} in pod {{ $labels.pod }}
            is using {{ $value | humanizePercentage }} of its CPU quota.

  # ── Database ─────────────────────────────────────────────────────────────────
  - name: database_health
    interval: 60s
    rules:

      - alert: HighDBConnectionCount
        # More than 80 active connections (default max is 100)
        expr: pg_stat_activity_count > 80
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High PostgreSQL connection count"
          description: >
            PostgreSQL has {{ $value }} active connections, approaching the
            connection limit. Consider enabling PgBouncer.

      - alert: DBDown
        expr: pg_up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "PostgreSQL is down"
          description: "The PostgreSQL exporter cannot connect to the database."
          runbook: https://docs.tiklivepro.pro/runbooks/postgres-down
