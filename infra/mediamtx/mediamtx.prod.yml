# MediaMTX configuration — production

logLevel: info
logDestinations: [stdout]

# ── RTMP ─────────────────────────────────────────────────────────────────────
rtmpAddress: :1936
rtmpEncryption: "no"

# ── HLS ──────────────────────────────────────────────────────────────────────
hlsAddress: :8888
hlsEncryption: false
hlsAlwaysRemux: true
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 350ms

# ── WebRTC ────────────────────────────────────────────────────────────────────
webrtcAddress: :8889
# Fix WebRTC to a single mappable UDP port (exposed in docker-compose as 8189/udp).
# Without this, MediaMTX uses random ephemeral UDP ports that are unreachable.
webrtcLocalUDPAddress: :8189
# STUN lets MediaMTX discover its public IP (srflx candidate) so viewers on
# the public internet can connect. Without this, MediaMTX only advertises its
# Docker-internal IP, which is unreachable outside the host.
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

# ── Auth ─────────────────────────────────────────────────────────────────────
# MediaMTX does not interpolate $VAR in user/pass fields — using a named user
# with env-var credentials would store the literal string "$VAR" as the
# credential, making every authentication attempt fail.
# Session security is enforced at the app layer: only the authenticated owner
# of a session knows the ingestKey UUID. Ports 9997 and 1936 are not exposed
# outside the Docker network, so open auth on those ports is safe.
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback
      - action: metrics

# ── REST API ──────────────────────────────────────────────────────────────────
api: true
apiAddress: :9997

# ── Record ───────────────────────────────────────────────────────────────────
# MediaMTX writes .mp4.part while recording is active (even with fmp4 format),
# then renames to .mp4 when record:false is PATCHed or the publisher disconnects.
# The RecordingUploader in stream-orchestrator watches /recordings, uploads
# completed .mp4 files to object storage, then deletes them locally.
# recordDeleteAfter: 0s disables MediaMTX's own auto-delete; the uploader owns
# the file lifecycle.
#
# IMPORTANT: recording is enabled at path-config level (see paths below), NOT via
# the API after a WHIP stream arrives. MediaMTX applies the path config when the
# path instance is CREATED (publisher connects); a PATCH call made after the
# connection is established cannot enable recording for that instance — it only
# takes effect on the next reconnect. Putting record:yes in the config file
# ensures recording starts from the very first WHIP frame.
record: no
recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
recordFormat: fmp4
recordSegmentDuration: 1h
recordDeleteAfter: 0s

# ── Paths ─────────────────────────────────────────────────────────────────────
paths:
  # Record all browser WHIP streams from frame 1. The stream-orchestrator can
  # override per-path via the REST API to implement Stop/Pause:
  #   PATCH /v3/config/paths/patch/live%2F{uuid}  { "record": false }  → stop
  #   PATCH /v3/config/paths/patch/live%2F{uuid}  { "record": true  }  → resume
  "~^live/":
    source: publisher
    record: yes
  all_others:
    source: publisher
