# MediaMTX configuration — production
# Identical to mediamtx.yml except auth requires credentials from env vars:
#   MEDIAMTX_API_USER  — API/management username
#   MEDIAMTX_API_PASS  — API/management password (min 32 chars recommended)

logLevel: info
logDestinations: [stdout]

# ── RTMP ─────────────────────────────────────────────────────────────────────
rtmpAddress: :1936
rtmpEncryption: "no"

# ── HLS ──────────────────────────────────────────────────────────────────────
hlsAddress: :8888
hlsEncryption: false
hlsAlwaysRemux: true
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

# ── WebRTC ────────────────────────────────────────────────────────────────────
webrtcAddress: :8889

# ── Auth ─────────────────────────────────────────────────────────────────────
authInternalUsers:
  - user: $MEDIAMTX_API_USER
    pass: $MEDIAMTX_API_PASS
    ips: []
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback
      - action: metrics

# ── REST API ──────────────────────────────────────────────────────────────────
api: true
apiAddress: :9997
