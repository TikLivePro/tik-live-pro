# MediaMTX configuration — production

logLevel: info
logDestinations: [stdout]

# ── RTMP ─────────────────────────────────────────────────────────────────────
rtmpAddress: :1936
rtmpEncryption: "no"

# ── HLS ──────────────────────────────────────────────────────────────────────
hlsAddress: :8888
hlsEncryption: false
hlsAlwaysRemux: true
hlsVariant: lowLatency
hlsSegmentCount: 7
hlsSegmentDuration: 1s
hlsPartDuration: 200ms

# ── WebRTC ────────────────────────────────────────────────────────────────────
webrtcAddress: :8889
# Fix WebRTC to a single mappable UDP port (exposed in docker-compose).
# Without this, MediaMTX uses random ephemeral UDP ports that are unreachable.
webrtcLocalUDPAddress: :8189

# ── Auth ─────────────────────────────────────────────────────────────────────
# MediaMTX does not interpolate $VAR in user/pass fields — using a named user
# with env-var credentials would store the literal string "$VAR" as the
# credential, making every authentication attempt fail.
# Session security is enforced at the app layer: only the authenticated owner
# of a session knows the ingestKey UUID. Ports 9997 and 1936 are not exposed
# outside the Docker network, so open auth on those ports is safe.
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback
      - action: metrics

# ── REST API ──────────────────────────────────────────────────────────────────
api: true
apiAddress: :9997

# ── Paths ─────────────────────────────────────────────────────────────────────
# Allow any dynamically-created path (browser WHIP publisher, RTMP relay, etc.)
# Without this block every WHIP/RTMP/HLS request returns "path not configured".
paths:
  all_others:
    source: publisher
