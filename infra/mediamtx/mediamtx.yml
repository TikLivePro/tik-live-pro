# MediaMTX configuration — platform-native streaming relay
# Go binary, ~5 MB RAM idle, near-zero CPU (pure relay, no transcoding)
#
# Roles in TikLivePro:
#   - Receives RTMP relay from the stream-orchestrator ffmpeg worker
#   - Serves HLS to browser viewers at /live/{ingestKey}/index.m3u8
#   - Serves WebRTC to browser viewers (bonus, zero-latency preview)
#
# Ports:
#   1936  RTMP input  (stream-orchestrator pushes here)
#   8888  HLS output  (browser viewers read from here)
#   8889  WebRTC      (optional low-latency viewer)
#   9997  REST API    (management / health)

logLevel: info
logDestinations: [stdout]

# ── Connection stability ──────────────────────────────────────────────────────
readTimeout: 10s
writeTimeout: 10s
writeQueueSize: 2048

# ── RTMP ─────────────────────────────────────────────────────────────────────
rtmpAddress: :1936
rtmpEncryption: "no"

# ── HLS ──────────────────────────────────────────────────────────────────────
hlsAddress: :8888
hlsEncryption: false
hlsAlwaysRemux: true
hlsVariant: lowLatency
# 2s segments + 10-segment playlist = 20s buffer. Absorbs CPU/memory spikes
# without the player stalling. Same values as prod for dev/prod parity.
hlsSegmentDuration: 2s
hlsSegmentCount: 10
# 500ms parts: comfortably above the 333ms keyframe interval at 30fps/10-frame
# GOP. Silences the iOS "part duration changed" re-estimate loop.
hlsPartDuration: 500ms

# ── WebRTC ────────────────────────────────────────────────────────────────────
webrtcAddress: :8889
# Advertise 127.0.0.1 so the browser (on the Docker host) can reach MediaMTX
# through the mapped UDP port. Required when MediaMTX runs inside Docker.
webrtcAdditionalHosts: [127.0.0.1]
# Fix WebRTC to a single mappable UDP port instead of random ephemeral ports.
webrtcLocalUDPAddress: :8189
# STUN lets the browser discover its public ICE candidate when streaming from
# behind NAT. No effect in purely local dev but harmless and required in prod.
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
# Defaults (10s / 5s) are tuned for good connections. A publisher/viewer on a
# lossy or high-latency link (mobile, poor wifi) needs more time for STUN
# binding requests and DTLS to round-trip before MediaMTX gives up and closes
# the session with "deadline exceeded while waiting connection" — this alone
# does not fix a connection that can NEVER complete ICE (see docs/infra.md,
# "WebRTC ICE candidates" section, for when a TURN relay is required instead).
webrtcHandshakeTimeout: 20s
webrtcSTUNGatherTimeout: 10s

# ── Auth ─────────────────────────────────────────────────────────────────────
# Accept any username/password — dev only
authInternalUsers:
  - user: any
    pass:
    ips: []
    permissions:
      - action: api
      - action: publish
      - action: read
      - action: playback
      - action: metrics

# ── REST API ──────────────────────────────────────────────────────────────────
api: true
apiAddress: :9997

# ── Path defaults (record settings) ──────────────────────────────────────────
# Disabled in dev by default — set record: true to test the upload pipeline locally.
# /recordings is bind-mounted from /tmp/tiklive-recordings on the host (see docker-compose.dev.yml)
# so stream-orchestrator (running on the host) can scan and upload the same files.
pathDefaults:
  record: false
  recordPath: /recordings/%path/%Y-%m-%d_%H-%M-%S-%f
  recordFormat: fmp4
  recordSegmentDuration: 1h
  recordDeleteAfter: 0s

# ── Paths ─────────────────────────────────────────────────────────────────────
# Allow any dynamically-created path (browser WHIP publisher, RTMP relay, etc.)
# NOTE: `all_others:` with no value parses as null in Go, causing path lookups
# to return nil and every WHIP/RTMP connection to fail with "not configured".
# The explicit `source: publisher` forces a non-nil PathConf struct.
paths:
  all_others:
    source: publisher
