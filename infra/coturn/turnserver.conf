# coturn configuration — TURN relay for WebRTC (WHIP/WHEP) clients that cannot
# complete a direct or STUN-reflexive ICE connection (carrier-grade NAT,
# restrictive corporate/public wifi firewalls). See docs/infra.md, "WebRTC ICE
# candidates", for when this is needed vs. STUN alone.
#
# Secrets (static-auth-secret, external-ip) are NOT set here — they are passed
# via the `command:` override in docker-compose so docker-compose's own ${VAR}
# interpolation injects them, the same workaround MediaMTX's config uses for
# $VAR-in-YAML (coturn's turnserver.conf has no env-var interpolation either).

listening-port=3478

# Ephemeral (short-lived, HMAC-based) credentials minted by stream-orchestrator's
# GET /sessions/:id/ingest and GET /ice-servers — see
# services/stream-orchestrator/src/infrastructure/turn/turn-credentials.ts.
# No long-lived static username/password is configured; nothing here can be
# scraped from client JS and reused indefinitely.
use-auth-secret
realm=tiklivepro.me

# Relay (allocated) port range. Kept narrow — TURN is a fallback path for a
# minority of poor-connection clients, not the default transport — so this
# comfortably supports concurrent relayed sessions without opening a large
# public UDP range. Widen if metrics show allocations being exhausted.
min-port=49160
max-port=49200

# One UDP relay port is enough per allocation (audio+video are bundled onto a
# single ICE component in modern WebRTC) — no need for RFC 5766's odd/even
# port-pair reservation used by legacy channel-per-media-type clients.
no-multicast-peers

# No CLI/telnet management console — not used, and it listens on all
# interfaces by default if left enabled.
no-cli

# TLS (turns:/5349) is not configured — would need a certificate. A plain
# turn: relay (UDP/TCP) is already a major reliability improvement over
# STUN-only and works for the carrier-NAT/firewall case this exists for.
# Revisit if a client network specifically blocks non-443 TURN too.
no-tls
no-dtls

# Never relay to loopback/private/link-local ranges — without this a TURN
# server can be abused to reach internal services on its own host/network.
no-loopback-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
