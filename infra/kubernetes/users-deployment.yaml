# ==============================================================================
# Users Service — Deployment + Service + HPA
# Port: 3002
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-service
  namespace: tik-live-pro
  labels:
    app: users-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-service
  template:
    metadata:
      labels:
        app: users-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3002"
    spec:
      containers:
        - name: users-service
          image: ghcr.io/tik-live-pro/users-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3002"
            - name: LOG_LEVEL
              value: "info"
            - name: NATS_URL
              value: nats://nats-service:4222
            - name: CDN_BASE_URL
              value: https://cdn.tiklivepro.pro
            - name: CORRELATION_ID_HEADER
              value: x-correlation-id
            - name: TRACE_ID_HEADER
              value: x-trace-id
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: users-service-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: users-service-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3002
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: users-service
  namespace: tik-live-pro
  labels:
    app: users-service
spec:
  selector:
    app: users-service
  ports:
    - port: 3002
      targetPort: 3002
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: users-service-hpa
  namespace: tik-live-pro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: users-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
