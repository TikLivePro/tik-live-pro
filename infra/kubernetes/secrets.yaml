# ==============================================================================
# Kubernetes Secrets — tik-live-pro
#
# WARNING: This file contains SECRET TEMPLATES only.
# Do NOT commit real credentials to git.
#
# Usage:
#   1. Copy this file:  cp secrets.yaml secrets.local.yaml
#   2. Replace every <base64-encoded-...> placeholder:
#        echo -n "your-value" | base64 -w 0
#   3. Apply:  kubectl apply -f secrets.local.yaml
#   4. Add secrets.local.yaml to .gitignore
#
# Alternatively, use External Secrets Operator or Sealed Secrets for GitOps.
# ==============================================================================

# --------------------------------------------------------------------------
# Shared JWT secret — must be identical across all services that validate JWTs
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secret
  namespace: tik-live-pro
type: Opaque
data:
  # echo -n "your-64-char-random-string" | base64 -w 0
  jwt-secret: <base64-encoded-jwt-secret>
  jwt-access-expires-in: MTVt    # 15m
  jwt-refresh-expires-in: MzBk   # 30d

---
# --------------------------------------------------------------------------
# Auth service secrets
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secrets
  namespace: tik-live-pro
type: Opaque
data:
  # postgresql://postgres:<password>@postgres-service:5432/tiklivepro_auth
  database-url: <base64-encoded-auth-database-url>
  jwt-secret: <base64-encoded-jwt-secret>

---
# --------------------------------------------------------------------------
# Users service secrets
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: users-service-secrets
  namespace: tik-live-pro
type: Opaque
data:
  database-url: <base64-encoded-users-database-url>
  jwt-secret: <base64-encoded-jwt-secret>

---
# --------------------------------------------------------------------------
# Live-Session service secrets
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: live-session-secrets
  namespace: tik-live-pro
type: Opaque
data:
  database-url: <base64-encoded-live-session-database-url>
  jwt-secret: <base64-encoded-jwt-secret>

---
# --------------------------------------------------------------------------
# Billing service secrets (Stripe)
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: billing-service-secrets
  namespace: tik-live-pro
type: Opaque
data:
  database-url: <base64-encoded-billing-database-url>
  jwt-secret: <base64-encoded-jwt-secret>
  # sk_live_...
  stripe-secret-key: <base64-encoded-stripe-secret-key>
  # whsec_...
  stripe-webhook-secret: <base64-encoded-stripe-webhook-secret>
  # price_...
  stripe-premium-price-id: <base64-encoded-stripe-premium-price-id>

---
# --------------------------------------------------------------------------
# Integrations service secrets (TikTok, Facebook OAuth + token encryption)
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: integrations-service-secrets
  namespace: tik-live-pro
type: Opaque
data:
  database-url: <base64-encoded-integrations-database-url>
  jwt-secret: <base64-encoded-jwt-secret>
  tiktok-client-key: <base64-encoded-tiktok-client-key>
  tiktok-client-secret: <base64-encoded-tiktok-client-secret>
  facebook-app-id: <base64-encoded-facebook-app-id>
  facebook-app-secret: <base64-encoded-facebook-app-secret>
  # 32+ character AES-256-GCM key
  token-encryption-key: <base64-encoded-token-encryption-key>

---
# --------------------------------------------------------------------------
# Comments service secrets
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: comments-service-secrets
  namespace: tik-live-pro
type: Opaque
data:
  database-url: <base64-encoded-comments-database-url>
  jwt-secret: <base64-encoded-jwt-secret>

---
# --------------------------------------------------------------------------
# Notifications service secrets
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: notifications-service-secrets
  namespace: tik-live-pro
type: Opaque
data:
  database-url: <base64-encoded-notifications-database-url>
  jwt-secret: <base64-encoded-jwt-secret>

---
# --------------------------------------------------------------------------
# Analytics service secrets
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: analytics-service-secrets
  namespace: tik-live-pro
type: Opaque
data:
  database-url: <base64-encoded-analytics-database-url>
  jwt-secret: <base64-encoded-jwt-secret>

---
# --------------------------------------------------------------------------
# Stream Orchestrator secrets
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: stream-orchestrator-secrets
  namespace: tik-live-pro
type: Opaque
data:
  database-url: <base64-encoded-stream-database-url>
  tiktok-client-key: <base64-encoded-tiktok-client-key>
  tiktok-client-secret: <base64-encoded-tiktok-client-secret>
  facebook-app-id: <base64-encoded-facebook-app-id>
  facebook-app-secret: <base64-encoded-facebook-app-secret>

---
# --------------------------------------------------------------------------
# API Gateway secrets
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway-secrets
  namespace: tik-live-pro
type: Opaque
data:
  jwt-secret: <base64-encoded-jwt-secret>

---
# --------------------------------------------------------------------------
# PostgreSQL credentials (used by the postgres StatefulSet)
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: tik-live-pro
type: Opaque
data:
  postgres-user: cG9zdGdyZXM=      # postgres
  postgres-password: <base64-encoded-postgres-password>

---
# --------------------------------------------------------------------------
# Grafana admin credentials
# --------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: tik-live-pro
type: Opaque
data:
  admin-user: YWRtaW4=             # admin
  admin-password: <base64-encoded-grafana-admin-password>
