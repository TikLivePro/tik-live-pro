# ==============================================================================
# Status Page — Deployment + Service
# Port: 3011 (Next.js standalone)
# Accessible at: https://status.tiklivepro.me (Caddy) / status.tiklivepro.pro (K8s ingress)
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: status
  namespace: tik-live-pro
  labels:
    app: status
    tier: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: status
  template:
    metadata:
      labels:
        app: status
    spec:
      containers:
        - name: status
          image: ghcr.io/tik-live-pro/status:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3011
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3011"
            - name: HOSTNAME
              value: "0.0.0.0"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=64"
            - name: API_GATEWAY_URL
              value: http://api-gateway:3000
            - name: AUTH_SERVICE_URL
              value: http://auth-service:3001
            - name: USERS_SERVICE_URL
              value: http://users-service:3002
            - name: LIVE_SESSION_SERVICE_URL
              value: http://live-session-service:3003
            - name: BILLING_SERVICE_URL
              value: http://billing-service:3004
            - name: INTEGRATIONS_SERVICE_URL
              value: http://integrations-service:3005
            - name: COMMENTS_SERVICE_URL
              value: http://comments-service:3006
            - name: NOTIFICATIONS_SERVICE_URL
              value: http://notifications-service:3007
            - name: ANALYTICS_SERVICE_URL
              value: http://analytics-service:3008
            - name: STREAM_ORCHESTRATOR_URL
              value: http://stream-orchestrator-service:3009
            - name: MEDIAMTX_API_URL
              value: http://mediamtx-service:9997
            - name: NATS_MONITORING_URL
              value: http://nats-service:8222
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "96Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 3011
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3011
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3

---

apiVersion: v1
kind: Service
metadata:
  name: status-service
  namespace: tik-live-pro
  labels:
    app: status
spec:
  selector:
    app: status
  ports:
    - protocol: TCP
      port: 3011
      targetPort: 3011
