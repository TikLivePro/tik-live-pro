# ==============================================================================
# Stream Orchestrator — Deployment + Service + HPA
# Port: 3009 (HTTP API)
# Port: 1935 (RTMP ingest — exposed via NodePort)
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-orchestrator
  namespace: tik-live-pro
  labels:
    app: stream-orchestrator
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stream-orchestrator
  template:
    metadata:
      labels:
        app: stream-orchestrator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3009"
    spec:
      containers:
        - name: stream-orchestrator
          image: ghcr.io/tik-live-pro/stream-orchestrator:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3009
              name: http
            - containerPort: 1935
              name: rtmp
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3009"
            - name: LOG_LEVEL
              value: "info"
            - name: NATS_URL
              value: nats://nats-service:4222
            - name: RTMP_INGEST_PORT
              value: "1935"
            - name: RTMP_INGEST_HOST
              value: "0.0.0.0"
            - name: INTEGRATIONS_SERVICE_URL
              value: http://integrations-service:3005
            - name: MEDIAMTX_RTMP_URL
              value: rtmp://mediamtx-internal:1936
            - name: MEDIAMTX_HLS_URL
              value: https://hls.tiklivepro.me
            - name: MEDIAMTX_WEBRTC_URL
              value: https://webrtc.tiklivepro.me
            - name: MEDIAMTX_API_URL
              value: http://mediamtx-internal:9997
            - name: MEDIAMTX_API_USER
              valueFrom:
                secretKeyRef:
                  name: mediamtx-secrets
                  key: api-user
            - name: MEDIAMTX_API_PASS
              valueFrom:
                secretKeyRef:
                  name: mediamtx-secrets
                  key: api-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stream-orchestrator-secrets
                  key: database-url
            - name: TIKTOK_CLIENT_KEY
              valueFrom:
                secretKeyRef:
                  name: stream-orchestrator-secrets
                  key: tiktok-client-key
            - name: TIKTOK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: stream-orchestrator-secrets
                  key: tiktok-client-secret
            - name: FACEBOOK_APP_ID
              valueFrom:
                secretKeyRef:
                  name: stream-orchestrator-secrets
                  key: facebook-app-id
            - name: FACEBOOK_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: stream-orchestrator-secrets
                  key: facebook-app-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3009
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3009
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 3

---
# ClusterIP service for internal HTTP API access
apiVersion: v1
kind: Service
metadata:
  name: stream-orchestrator
  namespace: tik-live-pro
  labels:
    app: stream-orchestrator
spec:
  selector:
    app: stream-orchestrator
  ports:
    - port: 3009
      targetPort: 3009
      name: http

---
# NodePort service for RTMP ingest (port 1935)
# Streamers push RTMP directly to the node IP.
# For cloud use, replace with a LoadBalancer service or a dedicated RTMP LB.
apiVersion: v1
kind: Service
metadata:
  name: stream-orchestrator-rtmp
  namespace: tik-live-pro
  labels:
    app: stream-orchestrator
spec:
  type: NodePort
  selector:
    app: stream-orchestrator
  ports:
    - port: 1935
      targetPort: 1935
      nodePort: 31935
      protocol: TCP
      name: rtmp

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: stream-orchestrator-hpa
  namespace: tik-live-pro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: stream-orchestrator
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 75
