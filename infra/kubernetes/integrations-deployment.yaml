# ==============================================================================
# Integrations Service — Deployment + Service + HPA
# Port: 3005
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: integrations-service
  namespace: tik-live-pro
  labels:
    app: integrations-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: integrations-service
  template:
    metadata:
      labels:
        app: integrations-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3005"
    spec:
      containers:
        - name: integrations-service
          image: ghcr.io/tik-live-pro/integrations-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3005
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3005"
            - name: LOG_LEVEL
              value: "info"
            - name: NATS_URL
              value: nats://nats-service:4222
            # Must be the public-facing URL for OAuth callbacks
            - name: OAUTH_REDIRECT_BASE_URL
              value: https://api.tiklive.pro/integrations
            - name: CORRELATION_ID_HEADER
              value: x-correlation-id
            - name: TRACE_ID_HEADER
              value: x-trace-id
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: integrations-service-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-service-secrets
                  key: jwt-secret
            - name: TIKTOK_CLIENT_KEY
              valueFrom:
                secretKeyRef:
                  name: integrations-service-secrets
                  key: tiktok-client-key
            - name: TIKTOK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-service-secrets
                  key: tiktok-client-secret
            - name: FACEBOOK_APP_ID
              valueFrom:
                secretKeyRef:
                  name: integrations-service-secrets
                  key: facebook-app-id
            - name: FACEBOOK_APP_SECRET
              valueFrom:
                secretKeyRef:
                  name: integrations-service-secrets
                  key: facebook-app-secret
            - name: TOKEN_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: integrations-service-secrets
                  key: token-encryption-key
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3005
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: integrations-service
  namespace: tik-live-pro
  labels:
    app: integrations-service
spec:
  selector:
    app: integrations-service
  ports:
    - port: 3005
      targetPort: 3005
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: integrations-service-hpa
  namespace: tik-live-pro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: integrations-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
