# ==============================================================================
# Notifications Service — Deployment + Service + HPA
# Port: 3007
# ==============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-service
  namespace: tik-live-pro
  labels:
    app: notifications-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications-service
  template:
    metadata:
      labels:
        app: notifications-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "3007"
    spec:
      containers:
        - name: notifications-service
          image: ghcr.io/tik-live-pro/notifications-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3007
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3007"
            - name: LOG_LEVEL
              value: "info"
            - name: NATS_URL
              value: nats://nats-service:4222
            - name: CORRELATION_ID_HEADER
              value: x-correlation-id
            - name: TRACE_ID_HEADER
              value: x-trace-id
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notifications-service-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: notifications-service-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 3007
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 3007
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3

---
apiVersion: v1
kind: Service
metadata:
  name: notifications-service
  namespace: tik-live-pro
  labels:
    app: notifications-service
spec:
  selector:
    app: notifications-service
  ports:
    - port: 3007
      targetPort: 3007
      name: http

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: notifications-service-hpa
  namespace: tik-live-pro
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: notifications-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
