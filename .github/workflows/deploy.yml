name: CI — Build, Push & Deploy

on:
  push:
    branches: [main]       # build + push images (pas de deploy)
    tags:
      - 'v*.*.*'           # build + push + DEPLOY en production
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag à déployer (ex : v1.2.3)'
        required: true

# Un seul deploy à la fois ; annule le précédent si un tag arrive pendant le run
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:

  # ── Build backend services (tous en parallèle) ───────────────────────────────
  build-services:
    name: Build ${{ matrix.service.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - { name: api-gateway,         package: api-gateway,          port: "3000", dockerfile: Dockerfile.service }
          - { name: auth,                package: auth-service,          port: "3001", dockerfile: Dockerfile.service }
          - { name: users,               package: users-service,         port: "3002", dockerfile: Dockerfile.service }
          - { name: live-session,        package: live-session-service,  port: "3003", dockerfile: Dockerfile.service }
          - { name: billing,             package: billing-service,       port: "3004", dockerfile: Dockerfile.service }
          - { name: integrations,        package: integrations-service,  port: "3005", dockerfile: Dockerfile.service }
          - { name: comments,            package: comments-service,      port: "3006", dockerfile: Dockerfile.service }
          - { name: notifications,       package: notifications-service, port: "3007", dockerfile: Dockerfile.service }
          - { name: analytics,           package: analytics-service,     port: "3008", dockerfile: Dockerfile.service }
          - { name: stream-orchestrator, package: stream-orchestrator,   port: "3009", dockerfile: Dockerfile.stream-orchestrator }

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génère les tags selon le contexte :
      #   push main   → ghcr.io/.../package:main, :sha-<hash>
      #   push v1.2.3 → ghcr.io/.../package:1.2.3, :1.2, :1, :latest
      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.service.package }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build & push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/${{ matrix.service.dockerfile }}
          build-args: |
            SERVICE_NAME=${{ matrix.service.name }}
            PACKAGE_NAME=${{ matrix.service.package }}
            SERVICE_PORT=${{ matrix.service.port }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service.name }}
          push: true

  # ── Build Next.js frontend ───────────────────────────────────────────────────
  build-web:
    name: Build web (Next.js standalone)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/web
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          # NEXT_PUBLIC_* must be provided at build time — they are baked into
          # the JS bundle and cannot be changed via runtime env vars.
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_COMMENTS_WS_URL=${{ secrets.NEXT_PUBLIC_COMMENTS_WS_URL }}
            NEXT_PUBLIC_GIPHY_API_KEY=${{ secrets.NEXT_PUBLIC_GIPHY_API_KEY }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          push: true

  # ── Build status page ────────────────────────────────────────────────────────
  build-status:
    name: Build status page (Next.js standalone)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/status
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build & push status
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.status
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=status
          cache-to: type=gha,mode=max,scope=status
          push: true

  # ── Deploy (uniquement sur tag v*.*.* ou dispatch manuel) ────────────────────
  deploy:
    name: Deploy ${{ github.ref_name }} to production
    runs-on: ubuntu-latest
    needs: [build-services, build-web, build-status]
    # Ne déploie PAS à chaque push sur main — seulement sur tag ou dispatch
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          # metadata-action génère "1.2.3" (sans 'v') — on strip le préfixe
          echo "value=${TAG#v}" >> "$GITHUB_OUTPUT"
          # ghcr.io registry names must be lowercase
          echo "registry=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Copy compose file to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "docker-compose.prod.managed.yml"
          target: /opt/tiklivepro

      - name: Copy mediamtx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "infra/mediamtx/mediamtx.prod.yml"
          target: /opt/tiklivepro

      - name: Copy Caddy config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          source: "infra/caddy/Caddyfile"
          target: /opt/tiklivepro

      - name: Pull images & restart stack
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.value }}
          REGISTRY: ${{ steps.tag.outputs.registry }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TOKEN_ENCRYPTION_KEY: ${{ secrets.TOKEN_ENCRYPTION_KEY }}
          AUTH_DATABASE_URL: ${{ secrets.AUTH_DATABASE_URL }}
          USERS_DATABASE_URL: ${{ secrets.USERS_DATABASE_URL }}
          SESSIONS_DATABASE_URL: ${{ secrets.SESSIONS_DATABASE_URL }}
          BILLING_DATABASE_URL: ${{ secrets.BILLING_DATABASE_URL }}
          INTEGRATIONS_DATABASE_URL: ${{ secrets.INTEGRATIONS_DATABASE_URL }}
          COMMENTS_DATABASE_URL: ${{ secrets.COMMENTS_DATABASE_URL }}
          NOTIFICATIONS_DATABASE_URL: ${{ secrets.NOTIFICATIONS_DATABASE_URL }}
          ANALYTICS_DATABASE_URL: ${{ secrets.ANALYTICS_DATABASE_URL }}
          STREAM_DATABASE_URL: ${{ secrets.STREAM_DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          TIKTOK_CLIENT_KEY: ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET: ${{ secrets.TIKTOK_CLIENT_SECRET }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_PREMIUM_PRICE_ID: ${{ secrets.STRIPE_PREMIUM_PRICE_ID }}
          INTERNAL_API_KEY: ${{ secrets.INTERNAL_API_KEY }}
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          SMTP_PROVIDER: ${{ secrets.SMTP_PROVIDER }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_SECURE: ${{ secrets.SMTP_SECURE }}
          MEDIAMTX_API_USER: ${{ secrets.MEDIAMTX_API_USER }}
          MEDIAMTX_API_PASS: ${{ secrets.MEDIAMTX_API_PASS }}
          MEDIAMTX_WEBRTC_URL: ${{ secrets.MEDIAMTX_WEBRTC_URL }}
          RECORDING_STORAGE_PROVIDER: ${{ secrets.RECORDING_STORAGE_PROVIDER }}
          RECORDING_STORAGE_BUCKET: ${{ secrets.RECORDING_STORAGE_BUCKET }}
          RECORDING_STORAGE_REGION: ${{ secrets.RECORDING_STORAGE_REGION }}
          RECORDING_STORAGE_ENDPOINT: ${{ secrets.RECORDING_STORAGE_ENDPOINT }}
          RECORDING_STORAGE_ACCESS_KEY_ID: ${{ secrets.RECORDING_STORAGE_ACCESS_KEY_ID }}
          RECORDING_STORAGE_SECRET_ACCESS_KEY: ${{ secrets.RECORDING_STORAGE_SECRET_ACCESS_KEY }}
          RECORDING_STORAGE_CDN_URL: ${{ secrets.RECORDING_STORAGE_CDN_URL }}
          # Reuse DROPLET_IP — it is already the server's public IPv4 address.
          # MediaMTX advertises this in ICE candidates so browsers can reach UDP 8189.
          SERVER_PUBLIC_IP: ${{ secrets.DROPLET_IP }}
          # Web frontend — server-side runtime vars
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          # NEXT_PUBLIC_* are baked at build time (see build-web job above).
          # They are written to .env so the compose file reference is satisfied,
          # but changing them here requires a new image build to take effect.
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_COMMENTS_WS_URL: ${{ secrets.NEXT_PUBLIC_COMMENTS_WS_URL }}
          NEXT_PUBLIC_GIPHY_API_KEY: ${{ secrets.NEXT_PUBLIC_GIPHY_API_KEY }}
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          envs: IMAGE_TAG,REGISTRY,JWT_SECRET,TOKEN_ENCRYPTION_KEY,AUTH_DATABASE_URL,USERS_DATABASE_URL,SESSIONS_DATABASE_URL,BILLING_DATABASE_URL,INTEGRATIONS_DATABASE_URL,COMMENTS_DATABASE_URL,NOTIFICATIONS_DATABASE_URL,ANALYTICS_DATABASE_URL,STREAM_DATABASE_URL,REDIS_URL,TIKTOK_CLIENT_KEY,TIKTOK_CLIENT_SECRET,FACEBOOK_APP_ID,FACEBOOK_APP_SECRET,STRIPE_SECRET_KEY,STRIPE_WEBHOOK_SECRET,STRIPE_PREMIUM_PRICE_ID,INTERNAL_API_KEY,GRAFANA_PASSWORD,SMTP_PROVIDER,SMTP_USER,SMTP_PASS,SMTP_FROM,SMTP_HOST,SMTP_PORT,SMTP_SECURE,MEDIAMTX_API_USER,MEDIAMTX_API_PASS,MEDIAMTX_WEBRTC_URL,RECORDING_STORAGE_PROVIDER,RECORDING_STORAGE_BUCKET,RECORDING_STORAGE_REGION,RECORDING_STORAGE_ENDPOINT,RECORDING_STORAGE_ACCESS_KEY_ID,RECORDING_STORAGE_SECRET_ACCESS_KEY,RECORDING_STORAGE_CDN_URL,SERVER_PUBLIC_IP,NEXTAUTH_URL,NEXTAUTH_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,NEXT_PUBLIC_API_URL,NEXT_PUBLIC_COMMENTS_WS_URL,NEXT_PUBLIC_GIPHY_API_KEY
          script: |
            set -e
            cd /opt/tiklivepro

            echo "==> Deploying $IMAGE_TAG"

            echo "==> Updating Caddy config"
            cp /opt/tiklivepro/infra/caddy/Caddyfile /etc/caddy/Caddyfile
            systemctl reload caddy

            # Write .env from CI secrets on every deploy — server needs no manual .env maintenance
            printf '%s\n' \
              "REGISTRY=$REGISTRY" \
              "IMAGE_TAG=$IMAGE_TAG" \
              "JWT_SECRET=$JWT_SECRET" \
              "TOKEN_ENCRYPTION_KEY=$TOKEN_ENCRYPTION_KEY" \
              "AUTH_DATABASE_URL=$AUTH_DATABASE_URL" \
              "USERS_DATABASE_URL=$USERS_DATABASE_URL" \
              "SESSIONS_DATABASE_URL=$SESSIONS_DATABASE_URL" \
              "BILLING_DATABASE_URL=$BILLING_DATABASE_URL" \
              "INTEGRATIONS_DATABASE_URL=$INTEGRATIONS_DATABASE_URL" \
              "COMMENTS_DATABASE_URL=$COMMENTS_DATABASE_URL" \
              "NOTIFICATIONS_DATABASE_URL=$NOTIFICATIONS_DATABASE_URL" \
              "ANALYTICS_DATABASE_URL=$ANALYTICS_DATABASE_URL" \
              "STREAM_DATABASE_URL=$STREAM_DATABASE_URL" \
              "REDIS_URL=$REDIS_URL" \
              "TIKTOK_CLIENT_KEY=$TIKTOK_CLIENT_KEY" \
              "TIKTOK_CLIENT_SECRET=$TIKTOK_CLIENT_SECRET" \
              "FACEBOOK_APP_ID=$FACEBOOK_APP_ID" \
              "FACEBOOK_APP_SECRET=$FACEBOOK_APP_SECRET" \
              "STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY" \
              "STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET" \
              "STRIPE_PREMIUM_PRICE_ID=$STRIPE_PREMIUM_PRICE_ID" \
              "INTERNAL_API_KEY=$INTERNAL_API_KEY" \
              "GRAFANA_PASSWORD=$GRAFANA_PASSWORD" \
              "SMTP_PROVIDER=$SMTP_PROVIDER" \
              "SMTP_USER=$SMTP_USER" \
              "SMTP_PASS=$SMTP_PASS" \
              "SMTP_FROM=$SMTP_FROM" \
              "SMTP_HOST=$SMTP_HOST" \
              "SMTP_PORT=$SMTP_PORT" \
              "SMTP_SECURE=$SMTP_SECURE" \
              "MEDIAMTX_API_USER=$MEDIAMTX_API_USER" \
              "MEDIAMTX_API_PASS=$MEDIAMTX_API_PASS" \
              "MEDIAMTX_WEBRTC_URL=$MEDIAMTX_WEBRTC_URL" \
              "RECORDING_STORAGE_PROVIDER=$RECORDING_STORAGE_PROVIDER" \
              "RECORDING_STORAGE_BUCKET=$RECORDING_STORAGE_BUCKET" \
              "RECORDING_STORAGE_REGION=$RECORDING_STORAGE_REGION" \
              "RECORDING_STORAGE_ENDPOINT=$RECORDING_STORAGE_ENDPOINT" \
              "RECORDING_STORAGE_ACCESS_KEY_ID=$RECORDING_STORAGE_ACCESS_KEY_ID" \
              "RECORDING_STORAGE_SECRET_ACCESS_KEY=$RECORDING_STORAGE_SECRET_ACCESS_KEY" \
              "RECORDING_STORAGE_CDN_URL=$RECORDING_STORAGE_CDN_URL" \
              "SERVER_PUBLIC_IP=$SERVER_PUBLIC_IP" \
              "NEXTAUTH_URL=$NEXTAUTH_URL" \
              "NEXTAUTH_SECRET=$NEXTAUTH_SECRET" \
              "GOOGLE_CLIENT_ID=$GOOGLE_CLIENT_ID" \
              "GOOGLE_CLIENT_SECRET=$GOOGLE_CLIENT_SECRET" \
              "NEXT_PUBLIC_API_URL=$NEXT_PUBLIC_API_URL" \
              "NEXT_PUBLIC_COMMENTS_WS_URL=$NEXT_PUBLIC_COMMENTS_WS_URL" \
              "NEXT_PUBLIC_GIPHY_API_KEY=$NEXT_PUBLIC_GIPHY_API_KEY" \
              > .env

            n=0
            until docker compose -f docker-compose.prod.managed.yml pull; do
              n=$((n+1))
              if [ $n -ge 3 ]; then echo "Pull failed after 3 attempts"; exit 1; fi
              echo "Pull attempt $n failed, retrying in 20s..."
              sleep 20
            done

            docker compose -f docker-compose.prod.managed.yml up -d --remove-orphans

            docker image prune -f
            docker system prune -f

            echo "==> Stack status"
            docker compose -f docker-compose.prod.managed.yml ps
