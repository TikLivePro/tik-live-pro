# ==============================================================================
# docker-compose.dev.yml — Local development infrastructure
#
# Starts only the infrastructure services needed by microservices running
# directly on the host (via `make dev`). Does NOT run the application services
# themselves — those are started by Turborepo with hot-reload.
#
# Services:
#   nats        NATS JetStream          4222 (client)  8222 (monitoring)
#   postgres    PostgreSQL 16           5432
#   redis       Redis 7                 6379
#   mailpit     SMTP catch-all + UI     1025 (SMTP)    8025 (Web UI)
#   otel        OpenTelemetry Collector 4317 (gRPC)    4318 (HTTP)
#   jaeger      Jaeger all-in-one       16686 (UI)
#   prometheus  Prometheus              9090
#   grafana     Grafana                 3099 → 3000
#
# Quickstart:
#   make infra-up     # start all containers (detached)
#   make dev          # start all microservices with hot-reload
#   make nats-streams # create JetStream streams (run once after infra-up)
#
# Email in development:
#   Mailpit traps all outbound SMTP traffic — no real emails are ever sent.
#   Point the auth service at localhost:1025 with any credentials:
#     SMTP_PROVIDER=custom  SMTP_HOST=localhost  SMTP_PORT=1025
#     SMTP_SECURE=false     SMTP_USER=dev        SMTP_PASS=dev
#     SMTP_FROM=TikLive Pro <dev@tiklivepro.me>
#   Then open http://localhost:8025 to read captured messages.
#
# Notes:
#   - On Linux, host.docker.internal is not available by default.
#     Services running on the host are accessible via 172.17.0.1 (default
#     bridge gateway). The `extra_hosts` block below handles this.
#   - On Docker Desktop (Mac/Win), host.docker.internal resolves automatically.
# ==============================================================================

services:

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--name", "tik-live-pro-dev"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tiklivepro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP — auth service connects here in dev
      - "8025:8025"   # Web UI — http://localhost:8025
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # Jaeger HTTP collector (legacy)
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC — services push traces here
      - "4318:4318"   # OTLP HTTP — alternative transport
      - "8888:8888"   # Collector self-metrics (scraped by Prometheus)
      - "8889:8889"   # Prometheus exporter endpoint
    depends_on:
      - jaeger
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"   # allows POST /-/reload to reload config
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    # ── Linux host access fix ───────────────────────────────────────────────
    # On Linux, host.docker.internal does not resolve inside containers.
    # This adds it as an alias for the Docker bridge gateway (172.17.0.1)
    # so prometheus.yml can scrape services running on the host with
    # the same config used on Docker Desktop (Mac/Win).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning directory — auto-configures datasources on startup
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3099:3000"   # Grafana UI — http://localhost:3099 (admin/admin)
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

volumes:
  nats_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
