# ==============================================================================
# docker-compose.dev.yml — Local development infrastructure
#
# Starts only the infrastructure services needed by microservices running
# directly on the host (via `make dev`). Does NOT run the application services
# themselves — those are started by Turborepo with hot-reload.
#
# Services:
#   nats        NATS JetStream          4222 (client)  8222 (monitoring)
#   postgres    PostgreSQL 16           5432
#   redis       Redis 7                 6379
#   mailpit     SMTP catch-all + UI     1025 (SMTP)    8025 (Web UI)
#   otel        OpenTelemetry Collector 4317 (gRPC)    4318 (HTTP)
#   jaeger      Jaeger all-in-one       16686 (UI)
#   prometheus  Prometheus              9090
#   grafana     Grafana                 3099 → 3000
#   minio       S3-compatible storage   9000 (API)     9001 (Console UI)
#   minio-init  Creates the recordings bucket on first start (runs once then exits)
#
# Quickstart:
#   make infra-up     # start all containers (detached)
#   make dev          # start all microservices with hot-reload
#   make nats-streams # create JetStream streams (run once after infra-up)
#
# Email in development:
#   Mailpit traps all outbound SMTP traffic — no real emails are ever sent.
#   Point the auth service at localhost:1025 with any credentials:
#     SMTP_PROVIDER=custom  SMTP_HOST=localhost  SMTP_PORT=1025
#     SMTP_SECURE=false     SMTP_USER=dev        SMTP_PASS=dev
#     SMTP_FROM=TikLive Pro <dev@tiklivepro.me>
#   Then open http://localhost:8025 to read captured messages.
#
# Object storage (MinIO — local R2/Spaces substitute):
#   MinIO is S3-compatible. The RecordingUploader in stream-orchestrator uses it
#   with forcePathStyle=true (required for MinIO, unlike R2 or DO Spaces).
#   Console: http://localhost:9001  (minioadmin / minioadmin)
#   Bucket:  tiklivepro-recordings  (created automatically by minio-init)
#
# Recordings directory:
#   MediaMTX writes .fmp4 segments to /recordings inside its container.
#   That path is bind-mounted from /tmp/tiklive-recordings on the host, so the
#   host-based stream-orchestrator (RECORDINGS_DIR=/tmp/tiklive-recordings) sees
#   the same files and can upload them to MinIO.
#   Recording is disabled by default in mediamtx.yml — set record: true to test.
#
# Notes:
#   - On Linux, host.docker.internal is not available by default.
#     Services running on the host are accessible via 172.17.0.1 (default
#     bridge gateway). The `extra_hosts` block below handles this.
#   - On Docker Desktop (Mac/Win), host.docker.internal resolves automatically.
# ==============================================================================

services:

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222", "--name", "tik-live-pro-dev"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats_data:/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tiklivepro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"   # SMTP — auth service connects here in dev
      - "8025:8025"   # Web UI — http://localhost:8025
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"   # Jaeger UI
      - "14268:14268"   # Jaeger HTTP collector (legacy)
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel/otel-collector-config.yaml"]
    volumes:
      - ./infra/observability/otel-collector-config.yaml:/etc/otel/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC — services push traces here
      - "4318:4318"   # OTLP HTTP — alternative transport
      # NOTE: host ports 8888/8889 are owned by mediamtx (HLS + WebRTC).
      # Prometheus scrapes these over the internal Docker network (otel-collector:8889)
      # so the host-side port number doesn't matter for observability to work.
      - "18888:8888"  # Collector self-metrics
      - "18889:8889"  # Prometheus exporter endpoint
    depends_on:
      - jaeger
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"   # allows POST /-/reload to reload config
    volumes:
      - ./infra/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./infra/observability/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    # ── Linux host access fix ───────────────────────────────────────────────
    # On Linux, host.docker.internal does not resolve inside containers.
    # This adds it as an alias for the Docker bridge gateway (172.17.0.1)
    # so prometheus.yml can scrape services running on the host with
    # the same config used on Docker Desktop (Mac/Win).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - otel-collector
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning directory — auto-configures datasources on startup
      - ./infra/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3099:3000"   # Grafana UI — http://localhost:3099 (admin/admin)
    depends_on:
      - prometheus
      - jaeger
    restart: unless-stopped

  # Init container: chmod 777 the recordings bind-mount so the host-based
  # stream-orchestrator (running as the current user) can delete segments after upload.
  # Runs as root inside Alpine, which is sufficient to chmod the host directory.
  # mediamtx depends on this completing before it starts.
  mediamtx-init:
    image: alpine:latest
    command: ["sh", "-c", "mkdir -p /recordings && chmod 777 /recordings"]
    volumes:
      - /tmp/tiklive-recordings:/recordings
    restart: "no"

  mediamtx:
    image: bluenviron/mediamtx:latest
    # No custom entrypoint — recent mediamtx images use a scratch base with no /bin/sh.
    # mediamtx-init (above) ensures /recordings is 777 before this container starts.
    depends_on:
      mediamtx-init:
        condition: service_completed_successfully
    volumes:
      - ./infra/mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - /tmp/tiklive-recordings:/recordings
    ports:
      - "1936:1936"       # RTMP input — ffmpeg workers push here
      - "8888:8888"       # HLS output — browser viewers read from here
      - "8889:8889"       # WebRTC HTTP (WHIP/WHEP signalling)
      - "8189:8189/udp"   # WebRTC ICE UDP — must be mapped for browser streams to flow
      - "9997:9997"       # REST API
    # net.core.rmem_max / wmem_max must be set on the host — runc blocks container
    # access to host-namespaced procfs entries on modern kernels. Set once with:
    #   sudo sysctl -w net.core.rmem_max=7500000 net.core.wmem_max=7500000
    # The container inherits the host value; no sysctls block needed here.
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API — stream-orchestrator connects here
      - "9001:9001"   # Console UI — http://localhost:9001
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/tiklivepro-recordings &&
      mc anonymous set public local/tiklivepro-recordings &&
      echo 'MinIO bucket ready: tiklivepro-recordings'
      "
    restart: "no"

volumes:
  nats_data:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  minio_data:
